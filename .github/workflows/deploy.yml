name: Deploy

on:
  push:
    branches: [ main ]
  workflow_dispatch:   # allow manual deploys from the Actions tab

# Never run two deploys at once; let an in-flight deploy finish.
concurrency:
  group: production-deploy
  cancel-in-progress: false

jobs:
  deploy:
    runs-on: ubuntu-latest

    env:
      KAMAL_REGISTRY_PASSWORD: ${{ secrets.KAMAL_REGISTRY_PASSWORD }}
      RAILS_MASTER_KEY: ${{ secrets.RAILS_MASTER_KEY }}
      RESEND_API_KEY: ${{ secrets.RESEND_API_KEY }}

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Ruby
        uses: ruby/setup-ruby@v1
        with:
          ruby-version: .ruby-version
          bundler-cache: true

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Configure SSH access to the server
        run: |
          install -m 700 -d ~/.ssh
          echo "${{ secrets.SSH_PRIVATE_KEY }}" > ~/.ssh/id_ed25519
          chmod 600 ~/.ssh/id_ed25519
          # Pin a single, unhashed host key. `ssh-keyscan -H` emits several
          # key types in nondeterministic order, which net-ssh (Kamal's SSH
          # library) mishandles, causing flaky HostKeyMismatch failures.
          ssh-keyscan -t ed25519 5.78.82.33 >> ~/.ssh/known_hosts 2>/dev/null

      - name: Materialize secrets for Kamal (.env + master.key)
        run: |
          printf '%s' "$RAILS_MASTER_KEY" > config/master.key
          {
            printf 'KAMAL_REGISTRY_PASSWORD=%s\n' "$KAMAL_REGISTRY_PASSWORD"
            printf 'RESEND_API_KEY=%s\n'          "$RESEND_API_KEY"
          } > .env

      - name: Deploy with Kamal
        run: bundle exec kamal deploy
